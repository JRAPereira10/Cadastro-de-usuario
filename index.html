<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro Inteligente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Cadastro de Usuário</h2>
        <form id="cadastroForm">
            <div class="campo">
                <label>Nome Completo</label>
                <input type="text" id="nome" required>
            </div>

            <!-- ADICIONADO: Campo de Nascimento -->
            <div class="campo">
                <label>Data de Nascimento</label>
                <input type="date" id="nascimento" required>
            </div>
            
            <div class="campo">
                <label>CPF (Somente números)</label>
                <input type="text" id="cpf" required maxlength="11">
            </div>

            <!-- ADICIONADO: Campo de Celular -->
            <div class="campo">
                <label>Celular</label>
                <input type="tel" id="celular" required>
            </div>

            <div class="campo">
                <label>E-mail</label>
                <input type="email" id="email" required>
            </div>

            <!-- ADICIONADO: Campo de Senha (para evitar erro no JS) -->
            <div class="campo">
                <label>Senha</label>
                <input type="password" id="senha" required>
            </div>

            <button type="submit">Salvar Dados</button>
            
            <p id="mensagemFeedback"></p>
        </form>

        <hr>

        <h2>Lista de Usuários</h2>
        <ul id="listaUsuarios"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
